name: Preflight Build (Desktop + Gateway)

# Run this manually from the GitHub Actions UI to validate a build
# before pushing a tag. Produces the same outputs as the tag release
# (MSI + EXE artifacts) without creating a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to build from (default: HEAD)"
        required: false
        default: ""

jobs:
  # ── Desktop installer preflight ────────────────────────────────────
  preflight-desktop:
    name: Desktop (Windows MSI + EXE)
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-C codegen-units=1"
      CARGO_BUILD_JOBS: "1"
      TAURI_SIGNING_PRIVATE_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-windows-preflight-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-preflight-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-windows-preflight-${{ hashFiles('desktop/pnpm-lock.yaml') }}
          restore-keys: pnpm-windows-preflight-

      - name: Install dependencies
        run: pnpm --filter openclaw-secure-installer-desktop... install --frozen-lockfile

      - name: Run Rust tests
        working-directory: desktop/src-tauri
        run: cargo test

      - name: Build Frontend
        run: pnpm --filter openclaw-secure-installer-desktop... build

      - name: Build Tauri app
        shell: pwsh
        run: |
          $attempts = 0
          $maxAttempts = 2
          do {
            $attempts++
            Write-Host "Tauri build attempt $attempts / $maxAttempts"
            pnpm -C desktop tauri:build -- --verbose
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempts -ge $maxAttempts) {
              Write-Error "Tauri build failed after $maxAttempts attempts"
              exit 1
            }
            Write-Warning "Build failed (attempt $attempts), retrying in 30s..."
            Start-Sleep -Seconds 30
          } while ($true)

      - name: Print bundle paths
        shell: pwsh
        run: |
          Write-Host "`n=== Build Artifacts ==="
          Get-ChildItem desktop/src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  MSI : $($_.FullName)" }
          Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*-setup.exe -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  EXE : $($_.FullName)" }

      - name: Upload MSI (preflight)
        uses: actions/upload-artifact@v4
        with:
          name: preflight-msi-${{ github.run_number }}
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS EXE (preflight)
        uses: actions/upload-artifact@v4
        with:
          name: preflight-nsis-${{ github.run_number }}
          path: desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  # ── Gateway image preflight ────────────────────────────────────────
  preflight-gateway:
    name: Gateway (Docker build validation)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build but do NOT push — this validates the Dockerfile compiles cleanly
      - name: Build gateway image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: openclaw-gateway:preflight
          cache-from: type=gha
          cache-to: type=gha,mode=max
