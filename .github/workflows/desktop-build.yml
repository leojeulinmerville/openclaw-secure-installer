name: Desktop Build (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft_release:
        description: "Create a draft release (tag pushes always create non-draft)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  TAURI_SIGNING_PRIVATE_KEY: ""

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RUSTFLAGS: "-C codegen-units=1"
      CARGO_BUILD_JOBS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-windows-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-windows-${{ hashFiles('desktop/pnpm-lock.yaml') }}
          restore-keys: pnpm-windows-

      - name: Install dependencies
        run: pnpm --filter openclaw-secure-installer-desktop... install --frozen-lockfile

      - name: Download postgresql zip
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/resources
          curl -L -o desktop/src-tauri/resources/postgresql-windows-x64.zip "https://openclaw.ai/postgresql-windows-x64.zip"

      - name: Build Frontend
        run: pnpm --filter openclaw-secure-installer-desktop... build

      - name: Run Rust tests
        working-directory: desktop/src-tauri
        run: cargo test

      - name: Build Tauri app
        shell: pwsh
        run: |
          $attempts = 0
          $maxAttempts = 2
          do {
            $attempts++
            Write-Host "Tauri build attempt $attempts / $maxAttempts"
            pnpm -C desktop tauri:build -- --verbose
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempts -ge $maxAttempts) {
              Write-Error "Tauri build failed after $maxAttempts attempts"
              exit 1
            }
            Write-Warning "Build failed (attempt $attempts), retrying in 30s..."
            Start-Sleep -Seconds 30
          } while ($true)

      # Always upload artifacts (for preflight and tag builds)
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-installer-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # Attach MSI + EXE directly to GitHub Release (only on tag push)
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "My OpenClaw ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
